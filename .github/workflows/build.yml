name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-13]
        include:
          - os: ubuntu-latest
            artifact_name: linux
            cli_name: format-transplant-cli
            gui_name: transplant-app-gui
          - os: windows-latest
            artifact_name: windows
            cli_name: format-transplant-cli.exe
            gui_name: transplant-app-gui.exe
          - os: macos-latest
            artifact_name: macos-arm64
            cli_name: format-transplant-cli
            gui_name: FormatTransplant
          - os: macos-13
            artifact_name: macos-x86_64
            cli_name: format-transplant-cli
            gui_name: FormatTransplant

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build CLI App
        run: pyinstaller format-transplant-cli.spec --clean --noconfirm

      - name: Build GUI App
        run: pyinstaller transplant-app-gui.spec --clean --noconfirm

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
