name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: tests / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install runtime deps
        run: pip install python-docx lxml
      - name: Run unit tests
        env:
          # Force UTF-8 stdio so argparse-emitted help renders OK on Windows
          # where the default codepage is cp1252 until Python 3.15.
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: python -m unittest discover tests -v

  lint:
    name: lint / ruff + black + mypy + bandit + pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tooling
        run: |
          pip install python-docx lxml
          pip install ruff black mypy bandit pylint
      - name: ruff
        run: ruff check .
      - name: black --check
        run: black --check .
      - name: mypy
        run: mypy .
      - name: bandit (medium+)
        run: bandit -r . -x ./tests -ll
      - name: pylint (new code)
        run: pylint --rcfile=pyproject.toml rtf_to_docx_endnotes.py docxtool.py tests/ build.py
